version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mailscheduler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: ["node", "dist/index.js"]
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/mailscheduler
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  mail-worker:
    build: .
    command: ["node", "dist/mailWorker.js"]
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/mailscheduler
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 3

volumes:
  postgres_data: 